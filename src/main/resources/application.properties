# Server
server.port=8080

# CORS
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500

# Database - update with your MySQL credentials
spring.datasource.url=jdbc:mysql://localhost:3306/donor_finder_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Changeme
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=your-256-bit-secret-key-replace-this-in-production-use-at-least-32-chars
app.jwt.expiration-ms=86400000

# Email (use Gmail App Password or Mailtrap for testing)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=Changeme
spring.mail.password=Changeme
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Donor search radius (km)
app.donor.search-radius-km=50
